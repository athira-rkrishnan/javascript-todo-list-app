<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <link rel = "stylesheet" type = "text/css" href = "style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
    <div class = "container">
        <div class = "todoapp">
            <p id = "currDate" class = "date"></p>
            <h3>To Do List</h3>
            <div class = "tooltip">
                <button class = "plusbtn"><i class="fa-solid fa-plus"></i></button>
                <span class = "tipText">Create Task</span>
            </div>

            <div class = "newTask">
                <h4><i class="fa-solid fa-angles-right"></i>Create <span>Task</span></h4>
                <form>
                    <div>
                        <label for = "name">Task Name:</label><input type = "text" id = "name">
                    </div>
                    <div>
                        <label for = "time">Task Time:</label><input type = "text" id = "time">
                    </div>
                </form>
                <button>Add</button>
            </div>


        </div>
    </div>


    <script src = "script.js"></script>
    
</body>
</html>
